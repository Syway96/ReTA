# config.yaml

# ====================第一阶段：文本分块配置====================
data_processing:
  output_dir: "./processed_data"

  # Markdown分块配置
  markdown_chunker:
    enabled: true
    max_chunk_chars: 3000        # 最大块字符数
    min_chunk_chars: 0        # 最小块字符数
    preserve_headings: true    # 是否保留标题在块中
    combine_small_paragraphs: true  # 是否合并小段落

    # Markdown特定配置
    heading_level: 3            # 作为分块边界的标题级别
    include_code_blocks: true  # 是否包含代码块
    code_block_min_lines: 1     # 代码块最小行数

  # Markdown文本清洗配置
  cleaner:
    remove_empty_lines: true
    normalize_whitespace: true
    remove_metadata: false     # 是否移除Markdown元数据（如YAML front matter）

  streaming:
    enabled: false             # Markdown文件通常较小，默认禁用流式
    max_file_size_mb: 10       # 启用流式的文件大小阈值（MB）

  skip_existing: true          # 已处理的文件是否跳过

# ====================第二阶段：向量存储配置====================
vector_processing:
  persist_directory: "./vector_store"
  collection_prefix: "kb_"
  embedding:
    online_fallback: "BAAI/bge-small-zh-v1.5"
    device: "cpu"
    normalize_embeddings: true
    model_kwargs:
      trust_remote_code: true
    encode_kwargs:
      batch_size: 32
  batch_processing:
    enabled: true
    batch_size: 100
    show_progress: true
    max_concurrent_batches: 1

# ====================第三阶段：问答系统配置 ====================
qa_system:
  vector_store_dir: "./vector_store"

  # 嵌入模型配置
  embedding:
    online_fallback: "BAAI/bge-small-zh-v1.5"
    device: "cpu"  # cuda
    normalize_embeddings: true  # 归一化嵌入向量
    model_kwargs: {"device": "cpu"}  # cuda
    encode_kwargs: {"normalize_embeddings": true}  # 编码参数

  # LLM配置
  llm:
    num_predict: 4096  # 8192
    top_p: 0.9
    top_k: 40
    num_ctx: 32768  # 8192

  # 检索配置
  retrieval:
    k_per_store: 10    # 每个库的检索数量
    total_max_k: 30   # 总检索数量
    similarity_threshold: 0.5   # 相似度阈值
    enable_reranking: true  # 启用重排序功能
    dynamic_complexity:
      enabled: true
      simple_ratio: 0.5
      medium_ratio: 1.0
      complex_ratio: 1.5
      no_retrieval_ratio: 0.0
      hard_cap_total_max_k: 20

  # 重排序配置
  rerank:
    enabled: true  # 是否启用重排序
    method: "cross_encoder"  
    # 重排序方法: "cross_encoder", "embedding_similarity", "hybrid", "keyword_boost"
    top_k: 10  # 重排序后保留的文档数量
    score_threshold: 0.0  # 重排序分数阈值（0表示不过滤）
    use_cross_encoder: true  # 是否使用交叉编码器
    cross_encoder_model: "BAAI/bge-reranker-base"  # 交叉编码器模型（在线）
    cross_encoder_local_path: ""  # 由 .env 中的 CROSS_ENCODER_MODEL_PATH 管理

  # 提示词配置
  prompt:
    system_template: |-
      你是一位顶尖高校的AI课程助理教授，请严格遵守以下规则回答问题：
      
      【公式书写规范】
      - 所有行内公式必须使用 $ ... $ 格式，例如：$X$
      - 所有独立公式必须使用 $$ ... $$ 格式，例如：$$E = mc^2$$
      
      【核心原则】 
      1. **问题处理规则**：
       - 若问题**完全**超出材料范围：
         * 首先声明："这个问题不在当前课程材料的核心覆盖范围内。"
         * 然后补充："以下是我基于通用知识的理解："
         * 最后：不需要提供【参考来源】
      
      2. **全面覆盖原则**：回答必须尽可能综合**所有相关参考材料**的信息，不要遗漏重要内容。
       - 如果多个文档涉及同一主题，请整合它们的信息
       - 确保覆盖多个维度
       - 回答应体现信息的完整性，而非仅摘要
      
      3. **引用规范**：回答末尾**必须**根据检索结果列出**三级标题**章节来源！
       格式示例如下：
       【参考来源】
       1.《大模型基础》1.3.1-Transformer
       2.《大模型基础》2.3.2-BERT语言模型
      
      **参考材料：**
      {context}

    human_template: "{question}"

  # 系统配置 - 调整结构
  system:
    enable_multiple_stores: true
    show_retrieval_info: true
    log_level: "INFO"
    streaming_output: true  # 是否启用流式输出
    streaming_delay: 0.01   # 流式输出延迟（秒/字符）
